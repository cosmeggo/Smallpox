[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = "local nu_chip, nu_mult = G.GAME.selected_back:trigger_effect{context = 'final_scoring_step'*"
position = 'before'
match_indent = true
payload = '''
if G.planets then
    for i = 1, #G.planets do
        G.planets[i]:apply_to_run({type = 'after_hand'})
        delay(0.5)
    end
end
'''

[[patches]]
[patches.pattern]
target = 'functions/misc_functions.lua'
pattern = '''
  G.culled_table =  recursive_table_cull{
    cardAreas = cardAreas,
    tags = tags,
    GAME = G.GAME,
    STATE = G.STATE,
    ACTION = G.action or nil,
    BLIND = G.GAME.blind:save(),
    SCORING_CALC = G.GAME.current_scoring_calculation:save(),
    BACK = G.GAME.selected_back:save(),
    VERSION = G.VERSION
  }
'''
position = "at"
payload = '''
  local planets = {}
  for k, v in ipairs(G.planets or {}) do
    if (type(v) == "table") and v.is and v:is(Tag) then 
      local tagSer = v:save()
      if tagSer then planets[k] = tagSer end
    end
  end
  G.culled_table =  recursive_table_cull{
    cardAreas = cardAreas,
    tags = tags,
    planets = planets,
    GAME = G.GAME,
    STATE = G.STATE,
    ACTION = G.action or nil,
    BLIND = G.GAME.blind:save(),
    SCORING_CALC = G.GAME.current_scoring_calculation:save(),
    BACK = G.GAME.selected_back:save(),
    VERSION = G.VERSION
  }
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''check_and_set_high_score('most_money', G.GAME.dollars)'''
position = 'before'
match_indent = true
payload = '''
if saveTable then 
    self.planets = {}
    local planets = {}
    self.HUD_planets = {}
    local planets = saveTable.planets or {}
    for k, v in pairs(planets) do
        local _tag = Tag("tag_orbital")
        _tag:load(v)
        add_planet(nil, _tag)
    end
end
'''


[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
G.shop_jokers = CardArea(
      G.hand.T.x+0,
      G.hand.T.y+G.ROOM.T.y + 9,
      math.min(G.GAME.shop.joker_max*1.02*G.CARD_W,4.08*G.CARD_W),
      1.05*G.CARD_H, 
      {card_limit = G.GAME.shop.joker_max, type = 'shop', highlight_limit = 1, negative_info = true})
'''
position = 'at'
match_indent = true
payload = '''
if SPOX.get_selected_deck() == "b_ghost" and next(SMODS.find_card("j_smallpox_birthright")) then
    G.shop_jokers = CardArea(
      G.hand.T.x+0,
      G.hand.T.y+G.ROOM.T.y + 9,
      math.min(G.GAME.shop.joker_max*1.02*G.CARD_W,4.08*G.CARD_W) * 0.75,
      1.05*G.CARD_H, 
      {card_limit = G.GAME.shop.joker_max, type = 'shop', highlight_limit = 1, negative_info = true})
    G.shop_spectral = CardArea(
      G.hand.T.x+0,
      G.hand.T.y+G.ROOM.T.y + 9,
      math.min(G.GAME.shop.joker_max*1.02*G.CARD_W,4.08*G.CARD_W) * 0.25,
      1.05*G.CARD_H, 
      {card_limit = G.GAME.shop.joker_max, type = 'shop', highlight_limit = 1, negative_info = true})
else
    G.shop_jokers = CardArea(
      G.hand.T.x+0,
      G.hand.T.y+G.ROOM.T.y + 9,
      math.min(G.GAME.shop.joker_max*1.02*G.CARD_W,4.08*G.CARD_W),
      1.05*G.CARD_H, 
      {card_limit = G.GAME.shop.joker_max, type = 'shop', highlight_limit = 1, negative_info = true})
end
'''

[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
{n=G.UIT.C, config={align = "cm", padding = 0.2, r=0.2, colour = G.C.L_BLACK, emboss = 0.05, minw = 8.2}, nodes={
    {n=G.UIT.O, config={object = G.shop_jokers}},
}},
'''
position = 'at'
match_indent = true
payload = '''
{n=G.UIT.C, config={align = "cm", padding = 0.2, r=0.2, colour = G.C.L_BLACK, emboss = 0.05, minw = (SPOX.get_selected_deck() == "b_ghost" and next(SMODS.find_card("j_smallpox_birthright")) and 8.2*0.75 or 8.2)}, nodes={
    {n=G.UIT.O, config={object = G.shop_jokers}},
}},
SPOX.get_selected_deck() == "b_ghost" and next(SMODS.find_card("j_smallpox_birthright")) and {n=G.UIT.C, config={align = "cm", padding = 0.2, r=0.2, colour = G.C.L_BLACK, emboss = 0.05, minw = (8.2*0.25)}, nodes={
    {n=G.UIT.O, config={object = G.shop_spectral}},
}} or nil,
'''

[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
if card.area == G.shop_jokers and G.shop_jokers then --Add a buy button
'''
position = 'at'
match_indent = true
payload = '''
if (card.area == G.shop_jokers and G.shop_jokers) or (card.area == G.shop_spectral and G.shop_spectral) then --Add a buy button
'''

[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
for i = #G.shop_jokers.cards,1, -1 do
    local c = G.shop_jokers:remove_card(G.shop_jokers.cards[i])
    c:remove()
    c = nil
end
'''
position = 'after'
match_indent = true
payload = '''
if G.shop_spectral then
    for i = #G.shop_spectral.cards,1, -1 do
        local c = G.shop_spectral:remove_card(G.shop_spectral.cards[i])
        c:remove()
        c = nil
    end
    local new_shop_card = SMODS.create_card{set = "Spectral"}
    new_shop_card.cost = 5
    G.shop_spectral:emplace(new_shop_card)
    new_shop_card:juice_up()
    create_shop_card_ui(new_shop_card)
end
'''

[[patches]]
[patches.pattern]
target = 'game.lua'
pattern = '''
if G.load_shop_jokers then 
'''
position = 'before'
match_indent = true
payload = '''
if G.shop_spectral then
    if G.load_shop_spectral then 
        nosave_shop = true
        G.shop_spectral:load(G.load_shop_spectral)
        for k, v in ipairs(G.shop_spectral.cards) do
            create_shop_card_ui(v)
            if v.ability.consumeable then v:start_materialize() end
        end
        G.load_shop_spectral = nil
    else
        local new_shop_card = SMODS.create_card{set = "Spectral"}
        new_shop_card.cost = 5
        G.shop_spectral:emplace(new_shop_card)
        new_shop_card:juice_up()
        create_shop_card_ui(new_shop_card)
    end
end
'''

[[patches]]
[patches.pattern]
target = 'back.lua'
pattern = '''
if self.name == 'Plasma Deck' and args.context == 'final_scoring_step' then
'''
position = 'at'
match_indent = true
payload = '''
if self.name == 'Plasma Deck' and args.context == 'final_scoring_step' and not (SPOX.get_selected_deck() == "b_plasma" and next(SMODS.find_card("j_smallpox_birthright"))) then
'''

# Sprite in description
[[patches]]
[patches.pattern]
target = "functions/misc_functions.lua"
pattern = '''
if args.type == 'name' then
    final_line[#final_line+1] = {n=G.UIT.C, config={align = "m", colour = part.control.B and args.vars.colours[tonumber(part.control.B)] or part.control.X and loc_colour(part.control.X) or nil, r = 0.05, padding = 0.03, res = 0.15}, nodes={}}
'''
position = "at"
payload = '''
    if part.control.IMG then
        local sprite_mod = (part.control.s and tonumber(part.control.s) or 1) * desc_scale
        local atlas = SMODS.get_atlas(part.control.IMG)
        local w_mod = atlas.px / atlas.py
        final_line[#final_line + 1] = {
            n = G.UIT.O,
            config = {
                object = SMODS.create_sprite(0, 0, sprite_mod * w_mod, sprite_mod, atlas, {x = 0, y = 0})
            }
        }
    elseif args.type == 'name' then
        final_line[#final_line+1] = {n=G.UIT.C, config={align = "m", colour = part.control.B and args.vars.colours[tonumber(part.control.B)] or part.control.X and loc_colour(part.control.X) or nil, r = 0.05, padding = 0.03, res = 0.15}, nodes={}}
'''
match_indent = true