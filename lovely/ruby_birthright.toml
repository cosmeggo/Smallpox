[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
delay(0.3)
SMODS.cards_to_draw = (SMODS.cards_to_draw or 0) + space_taken
'''
position = "before"
payload = '''
if next(SMODS.find_card("j_smallpox_birthright")) and
    G.smallpox_discarded_cards and 
    SPOX.get_selected_deck() == "b_red" and
    (G.GAME.current_round.hands_played > 0 or
    G.GAME.current_round.discards_used > 0) then
        hand_space = math.min(#G.deck.cards, G.smallpox_discarded_cards + #SMODS.find_card("j_smallpox_birthright"))
        G.smallpox_discarded_cards = nil
end
'''
match_indent = true


[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
G.FUNCS.discard_cards_from_highlighted = function(e, hook)
'''
position = "after"
payload = '''
G.smallpox_discarded_cards = #G.hand.highlighted
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
SMODS.calculate_context({full_hand = G.play.cards, scoring_hand = scoring_hand, scoring_name = text, poker_hands = poker_hands, after = true})
'''
position = "after"
payload = '''
if G.GAME.smallpox_invested then
    G.FUNCS.progress_stocks()
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'engine/sprite.lua'
pattern = '''for k, v in pairs(self.children) do'''
position = 'before'
match_indent = true
payload = '''
if self and self.config.tag and self.config.tag.ability and self.config.tag.ability.negative then
	self.ARGS.send_to_shader = self.ARGS.send_to_shader or {}
	self.ARGS.send_to_shader[1] = math.min(self.VT.r*3, 1) + G.TIMERS.REAL/28 + (self.juice and self.juice.r*10 or 0) + (self.tilt_var and self.tilt_var.amt or 0)

	self.ARGS.send_to_shader[2] = G.TIMERS.REAL*2
	
	self:draw_shader("negative", nil, self.ARGS.send_to_shader)
	self:draw_shader('negative_shine', nil, self.ARGS.send_to_shader)
end
'''

[[patches]]
[patches.pattern]
target = 'engine/sprite.lua'
pattern = '''
if self.draw_steps then 
    for k, v in ipairs(self.draw_steps) do
        self:draw_shader(v.shader, v.shadow_height, v.send, v.no_tilt, v.other_obj, v.ms, v.mr, v.mx, v.my, not not v.send)
    end
else
    self:draw_self(overlay)
end
'''
position = 'before'
match_indent = true
payload = '''
if self and self.config.tag and self.config.tag.ability and self.config.tag.ability.birthright_planet and self.atlas.name ~= "smallpox_ruby_planets" then
    local t
    for i, v in pairs(SPOX.planet_tags) do
        if v.hand == self.config.tag.ability.birthright_planet then
            t = v
        end
    end
    if t then
	    self.atlas = G.ASSET_ATLAS["smallpox_ruby_planets"]
        self:set_sprite_pos(t.pos or {x=0,y=0})
        --self:reset()
    end
end
'''

[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''
elseif _c.set == 'Tag' then
'''
position = 'after'
match_indent = true
payload = '''
if card and card.ability and card.ability.negative then
	info_queue[#info_queue+1] = {set = "Edition", key = "e_negative_tag", config = {extra = 1}}
end
'''

[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
if AUT.card_type ~= 'Locked' and AUT.card_type ~= 'Undiscovered' then
'''
position = 'before'
match_indent = true
payload = '''
if AUT.card_type == "Tag" then
    local card = card and card.config.tag
    if card and card.ability and card.ability.negative then
        badges[#badges + 1] = create_badge(localize("negative", "labels"), get_badge_colour("negative"))
    end
end
'''

[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
G.FUNCS.cash_out = function(e)
'''
position = 'after'
match_indent = true
payload = '''
local s = G.GAME.round_resets.blind_states.Boss
'''


