position = 'at'
match_indent = true
payload = '''
if SPOX.get_selected_deck() == "b_green" and next(SMODS.find_card("j_smallpox_birthright")) then

else
    G.GAME.current_round.discards_left = math.max(0, G.GAME.round_resets.discards + G.GAME.round_bonus.discards)
